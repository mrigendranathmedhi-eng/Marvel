<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRIGEN MARVEL</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 class="title">MRIGEN</h1>

<div class="container">

    <div class="card" onclick="openHero('ironman.html')">
        <img src="https://i.imgur.com/8RKXAIV.jpg">
        <div class="hero-name">IRON MAN</div>
    </div>

    <div class="card" onclick="openHero('thor.html')">
        <img src="https://i.imgur.com/Qr71crq.jpg">
        <div class="hero-name">THOR</div>
    </div>

    <div class="card" onclick="openHero('spiderman.html')">
        <img src="https://i.imgur.com/9XntP8R.jpg">
        <div class="hero-name">SPIDER-MAN</div>
    </div>

    <div class="card" onclick="openHero('blackpanther.html')">
        <img src="https://i.imgur.com/Ky6G1dZ.jpg">
        <div class="hero-name">BLACK PANTHER</div>
    </div>

    <div class="card" onclick="openHero('captain.html')">
        <img src="https://i.imgur.com/c3c6KJk.jpg">
        <div class="hero-name">CAPTAIN AMERICA</div>
    </div>

</div>

<script>
function openHero(page){
    window.location.href = page;
}
</script>

</body>
</html>
